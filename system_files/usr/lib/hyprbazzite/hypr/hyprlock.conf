source = /etc/hypr/wallust/wallust-hyprland.conf
$Scripts = /etc/hypr/scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
    no_fade_in = false
}

background {
    monitor =
    path = /etc/hypr/wallust/current_wallpaper.png
    color = rgb(0,0,0)
    blur_size = 5
    blur_passes = 3
    noise = 0.0117
    contrast = 1.3
    brightness = 0.8
    vibrancy = 0.21
    vibrancy_darkness = 0.0
}

# -- Clock: Minutes --
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%M')"
    color = $orange
    font_size = 180
    font_family = JetBrainsMono Nerd Font
    position = 0, -80
    halign = center
    valign = center
}

# -- Clock: Hours --
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H')"
    color = $purple
    font_size = 180
    font_family = JetBrainsMono Nerd Font
    position = 0, 140
    halign = center
    valign = center
}

# -- Input Field --
input-field {
    monitor =
    size = 350, 60
    outline_thickness = 2
    outer_color = $purple
    inner_color = $current_line
    font_color = $cyan
    font_family = JetBrainsMono Nerd Font
    placeholder_text = 🔒 Type Password
    hide_input = false
    position = 0, 120
    halign = center
    valign = bottom
}

# -- Keyboard Layout Indicator --
label {
    monitor =
    text = $LAYOUT
    color = $cyan
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -20
    halign = center
    valign = top
}

# -- Uptime (bottom-left) --
label {
    monitor =
    text = cmd[update:60000] echo "<b> "$(uptime -p 2>/dev/null || echo 'Up')"</b>"
    color = $color13
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = -40, 40
    halign = right
    valign = bottom
}

# -- Weather (bottom-right, graceful fallback) --
label {
    monitor =
    text = cmd[update:3600000] [ -f "$HOME/.cache/.weather_cache" ] && cat "$HOME/.cache/.weather_cache" || echo ""
    color = $color13
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 40, 40
    halign = left
    valign = bottom
}