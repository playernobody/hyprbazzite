# Hyprbazzite Configuration Overlays
# This file ensures that system-wide configurations are linked from the immutable /usr tree to /etc

# Format: Type Path Mode UID GID Age Argument
# L+ means: Create a symbolic link, and if it already exists as a file, replace it.
# d means: Create a directory with the specified mode, owner, and group.
# C+ means: Create a copy of the file from the source to the destination if it does not already exist, and if it does exist but differs from the source, replace it.

# Type  Path                 Mode  UID   GID   Age  Argument
# 1. PURGE EXISTING MUTABLE DIRECTORIES FIRST
R! /etc/hypr
R! /etc/waybar
R! /etc/wofi
R! /etc/xdg

# 2. CORE DESKTOP ENVIRONMENT COPY (Now it acts on an empty slate)
C+ /etc/hypr - - - - /usr/lib/hyprbazzite/hypr
C+ /etc/waybar - - - - /usr/lib/hyprbazzite/waybar
C+ /etc/wofi - - - - /usr/lib/hyprbazzite/wofi
C+ /etc/xdg - - - - /usr/lib/hyprbazzite/xdg

# 3. SYSTEM CONFIGURATION OVERLAYS
L+ /etc/polkit-1/rules.d/10-tdp-control.rules - - - - /usr/lib/hyprbazzite/polkit-1/rules.d/10-tdp-control.rules
L+ /etc/polkit-1/rules.d/49-tblue-logind-hibernate.rules - - - - /usr/lib/hyprbazzite/polkit-1/rules.d/49-tblue-logind-hibernate.rules
C+ /etc/sddm.conf.d/10-theme.conf - - - - /usr/lib/hyprbazzite/sddm.conf.d/10-theme.conf
C+ /etc/sddm.conf.d/kde_settings.conf - - - - /usr/lib/hyprbazzite/sddm.conf.d/kde_settings.conf
L+ /etc/systemd/sleep.conf.d/90-tblue-hibernate.conf - - - - /usr/lib/hyprbazzite/systemd/sleep.conf.d/90-tblue-hibernate.conf
# OpenRGB udev rules now provided by openrgb-udev-rules RPM
L+ /etc/fonts/conf.d/50-jetbrains-mono.conf - - - - /usr/lib/hyprbazzite/fonts/conf.d/50-jetbrains-mono.conf

# 4. XDG AND APP CONFIGS
C+ /etc/xdg/mimeapps.list - - - - /usr/lib/hyprbazzite/xdg/mimeapps.list
d /etc/xdg/swaync 0755 root root - -
C+ /etc/xdg/swaync/config.json - - - - /usr/lib/hyprbazzite/xdg/swaync/config.json
C+ /etc/xdg/swaync/style.css - - - - /usr/lib/hyprbazzite/xdg/swaync/style.css
